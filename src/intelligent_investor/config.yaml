app:
  # secret_key is loaded from .env file (required)
  debug: true
  host: "0.0.0.0"
  port: 5001

database:
  relative_path: "data/investor.db"
  echo: false
  pool_pre_ping: true

log:
  level: "INFO"
  console: true
  file: "logs/investor.log"
  rotation: "10 MB"
  retention: "7 days"
  compression: "zip"
